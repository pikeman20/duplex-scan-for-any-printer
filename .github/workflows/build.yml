name: Build and Publish Add-on

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build ${{ matrix.arch }} add-on
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base-debian
            platform: linux/amd64
          - arch: aarch64
            build_from: ghcr.io/home-assistant/aarch64-base-debian
            platform: linux/arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get version from config.yaml
        id: version
        run: |
          echo "version=$(yq '.version' config.yaml)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name == 'push' }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/hassio-printer-duplex-scan-agent-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/hassio-printer-duplex-scan-agent-${{ matrix.arch }}:latest

  notify-parent-repo:
    name: Notify hassio-addons to sync submodule
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master')
    steps:
      - name: Trigger submodule sync in hassio-addons
        run: |
          curl -f -X POST \
            -H "Authorization: token ${{ secrets.HASSIO_ADDONS_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/pikeman20/hassio-addons/dispatches \
            -d '{"event_type":"printer-submodule-update"}'
