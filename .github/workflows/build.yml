name: Build and Publish Add-on

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build ${{ matrix.arch }} add-on
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, amd64]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get version from config.yaml
        id: version
        run: |
          echo "version=$(yq '.version' config.yaml)" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: home-assistant/builder@master
        with:
          args: |
            --${{ matrix.arch }} \
            --target . \
            --docker-hub ghcr.io/${{ github.repository_owner }} \
            --image hassio-scan-agent-{arch} \
            --version ${{ steps.version.outputs.version }}

  notify-parent-repo:
    name: Notify hassio-addons to sync submodule
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master')
    steps:
      - name: Trigger submodule sync in hassio-addons
        run: |
          curl -f -X POST \
            -H "Authorization: token ${{ secrets.HASSIO_ADDONS_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/pikeman20/hassio-addons/dispatches \
            -d '{"event_type":"printer-submodule-update"}'
